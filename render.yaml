services:
  - type: web
    name: hireme-ai
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: super_secret_hireme_key_2026
      - key: OAUTH_BASE_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LEMON_API_KEY
        sync: false
      - key: LEMON_STORE_ID
        sync: false
      - key: LEMON_VARIANT_ID
        sync: false
      - key: LEMON_WEBHOOK_SECRET
        sync: false
      - key: LEMON_TEST_MODE
        value: "false"
